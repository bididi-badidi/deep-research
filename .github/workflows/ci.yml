name: CI

on:
  push:
    branches: [main, "feat/*", "fix/*", "chore/*", "docs/*", "ci/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.project-path }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project-path:
          - .
    defaults:
      run:
        working-directory: ${{ matrix.project-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "${{ matrix.project-path }}/uv.lock"

      - name: Set up Python from .python-version
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

  test:
    name: Test (${{ matrix.project-path }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project-path:
          - .
    defaults:
      run:
        working-directory: ${{ matrix.project-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "${{ matrix.project-path }}/uv.lock"

      - name: Set up Python from .python-version
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Pytest with coverage
        run: uv run --with pytest-cov pytest --cov --cov-report=xml
